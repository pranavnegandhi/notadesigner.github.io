{{ $count := .Get "count" | default 10 }}
{{ range first $count (where site.RegularPages "Type" "posts") }}
<article style="margin-bottom:3rem;padding-bottom:2rem;border-bottom:1px solid var(--gray-200);">
  <h2 style="margin-bottom:0.3rem;"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
  <p style="color:var(--gray-500);font-size:0.92em;margin-top:0;margin-bottom:1.2rem;">
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
    {{ with .Params.categories }} ·
      {{ range $i, $c := . }}{{ if $i }}, {{ end }}<a href="{{ printf "/category/%s/" (urlize $c) | relURL }}">{{ $c }}</a>{{ end }}
    {{ end }}
  </p>
  <div>{{ .Content }}</div>
</article>
{{ end }}
